name: Daily Automatic Clock-In

on:
  schedule:
    # 6:00 PM PKT is 1:00 PM UTC (13:00)
    - cron: '0 13 * * *'
  # Allows you to manually trigger the clock-in from the Actions tab for testing
  workflow_dispatch: 

jobs:
  clock_in_job:
    runs-on: ubuntu-latest

    steps:
    - name: Send Clock-In POST Request
      run: |
        curl -X POST https://playwright-crawler-rajaabdulbasit3178-uoc73dpp.leapcell.dev/clockin \
             -H "Content-Length: 0"
