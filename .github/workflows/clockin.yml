name: Daily Automatic Clock-In

on:
  # Listens for an external API ping to trigger immediately
  repository_dispatch:
    types: [trigger-clockin]
    
  # Keeps manual button testing enabled
  workflow_dispatch:

jobs:
  clock_in_job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Execute Clock-In Script
      id: run_script
      env:
        WORK_EMAIL: ${{ secrets.WORK_EMAIL }}
        WORK_PASSWORD: ${{ secrets.WORK_PASSWORD }}
      run: node clockin.js

    # STEP A: Sends if you were ALREADY clocked in
    - name: Send Email - Already Clocked In
      if: success() && steps.run_script.outputs.CLOCKIN_STATE == 'ALREADY_CLOCKED_IN'
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "ℹ️ Already Clocked In Today"
        to: abasit@forthlogic.com
        from: GitHub Actions Automation <${{ secrets.EMAIL_USERNAME }}>
        attachments: screenshot.png
        body: |
          Hello,
          
          The automated script ran at 6:00 PM PKT and detected that you were ALREADY clocked in. 
           No action was needed.
          
          Your visual confirmation screenshot from the live dashboard is attached below.

    # STEP B: Sends if the automation freshly clocked you in
    - name: Send Email - Fresh Success
      if: success() && steps.run_script.outputs.CLOCKIN_STATE == 'SUCCESS'
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "✅ Clock-In Successful!"
        to: abasit@forthlogic.com
        from: GitHub Actions Automation <${{ secrets.EMAIL_USERNAME }}>
        attachments: screenshot.png
        body: |
          Hello,
          
          Your automated clock-in routine executed successfully at 6:00 PM PKT. 
          The script clicked the active button for you.
          
          Your confirmation screenshot is attached to this email. Have a great evening!

    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "❌ Clock-In FAILED!"
        to: abasit@forthlogic.com
        from: GitHub Actions Automation <${{ secrets.EMAIL_USERNAME }}>
        body: |
          Hello,
          
          ATTENTION: Your automated clock-in script failed on execution today.
          
          Please open your private GitHub repository and check the Actions runner log history to determine what went wrong, and make sure to manually process your clock-in for today!
