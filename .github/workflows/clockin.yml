name: Daily Automatic Clock-In

on:
  schedule:
    # 6:00 PM PKT is 1:00 PM UTC (13:00)
    - cron: '0 13 * * *'
  workflow_dispatch: 

jobs:
  clock_in_job:
    runs-on: ubuntu-latest

    steps:
    - name: Trigger Clock-In Endpoint
      run: |
        echo "Dispatching trigger to Leapcell..."
        
        # We give curl a max-time of 3 seconds. It hits Leapcell and disconnects immediately,
        # letting your Leapcell instance process the Playwright script in the background.
        curl --max-time 3 -X POST https://playwright-crawler-rajaabdulbasit3178-uoc73dpp.leapcell.dev/clockin \
             -H "Content-Length: 0" || true
             
        echo "Trigger successfully sent!"

    - name: Send Dispatch Confirmation Email
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚀 Clock-In Triggered Successfully"
        to: abasit@forthlogic.com
        from: GitHub Actions Automation <${{ secrets.EMAIL_USERNAME }}>
        body: |
          Hello,
          
          The daily automated clock-in routine has successfully sent the trigger signal to your Leapcell backend at 6:00 PM PKT.
          
          Your Playwright script is now running on your server. Have a wonderful evening!
